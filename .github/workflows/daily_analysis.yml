name: 📊 Análise Diária

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          cd backend
          pip install -r requirements.txt

      - name: 🗄️ Inicializar banco de dados
        run: |
          cd backend
          python db/init_db.py
        env:
          DB_PATH: ${{ github.workspace }}/data/lay_goleada.db

      - name: ⚽ Rodar análise do dia
        run: |
          cd backend
          python -m scripts.run_analysis
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          DB_PATH: ${{ github.workspace }}/data/lay_goleada.db

      - name: 💾 Commit dos dados atualizados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Recomendações do dia $(date +'%d/%m/%Y')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar dependências
        run: |
          cd frontend
          npm install

      - name: 🏗️ Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_BASE_URL: /football-ai-trading

      - name: ⬆️ Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
