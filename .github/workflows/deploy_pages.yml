name: 🚀 Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'data/recomendacoes_*.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências
        run: |
          cd frontend
          npm ci

      - name: 🏗️ Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_BASE_URL: /lay-goleada

      - name: ⬆️ Upload artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
